{% extends "base.html" %}

{% block content %}
<div style="min-height: calc(100vh - 5rem); display: flex; align-items: center; justify-content: center; padding: 2rem 1.5rem;">
    <div class="glass-panel animate-on-scroll" style="width: 100%; max-width: 28rem; padding: 3rem 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.5rem; font-weight: 700; color: white;">Welcome Back</h1>
            <p style="color: #9ca3af; font-size: 0.875rem; margin-top: 0.5rem;">Sign in to your Getsetai account</p>
        </div>

        <form id="login-form">
            <div id="error-message" style="display: none; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1.5rem; font-size: 0.875rem;">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submit-btn" class="btn-submit">Sign In</button>
        </form>

        <p style="text-align: center; color: #9ca3af; font-size: 0.875rem; margin-top: 1.5rem;">
            Don't have an account? <a href="/signup" style="color: var(--color-neon-cyan); text-decoration: none;">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');
        const errorDiv = document.getElementById('error-message');
        
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        errorDiv.style.display = 'none';

        try {
            const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) throw error;
            
            // Success
            window.location.href = '/';
            
        } catch (error) {
            errorDiv.textContent = error.message;
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
</script>
{% endblock %}
